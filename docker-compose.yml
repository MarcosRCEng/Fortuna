services:
  postgres:
    image: postgres:16-alpine
    container_name: fortuna-postgres
    environment:
      POSTGRES_DB: fortuna
      POSTGRES_USER: fortuna
      POSTGRES_PASSWORD: fortuna_dev
    ports:
      - "5432:5432"
    volumes:
      - fortuna_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortuna -d fortuna"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fortuna_postgres_data:
